<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" font-family="'Hiragino Sans', 'Noto Sans JP', 'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="640" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#374151">システム構成図</text>

  <!-- === Client (Browser) === -->
  <rect x="40" y="100" width="160" height="70" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="132" text-anchor="middle" font-size="14" font-weight="bold" fill="#1E3A5F">🌐 ブラウザ</text>
  <text x="120" y="150" text-anchor="middle" font-size="10" fill="#1E3A5F">PC / スマートフォン</text>

  <!-- Arrow browser → vercel -->
  <line x1="200" y1="135" x2="255" y2="135" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="228" y="127" text-anchor="middle" font-size="10" fill="#6B7280">HTTP</text>

  <!-- === Vercel Container === -->
  <rect x="260" y="50" width="400" height="300" rx="12" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <rect x="260" y="50" width="400" height="32" rx="12" fill="#E5E7EB"/>
  <rect x="260" y="70" width="400" height="12" fill="#E5E7EB"/>
  <text x="460" y="71" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">☁️ Vercel</text>

  <!-- Next.js -->
  <rect x="295" y="100" width="330" height="55" rx="8" fill="#000" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">▲ Next.js 16</text>
  <text x="460" y="144" text-anchor="middle" font-size="10" fill="#9CA3AF">App Router</text>

  <!-- shadcn/ui + Tailwind -->
  <rect x="295" y="168" width="330" height="50" rx="8" fill="#FFF" stroke="#D1D5DB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#374151">🎨 shadcn/ui + Tailwind CSS 4</text>
  <text x="460" y="210" text-anchor="middle" font-size="10" fill="#9CA3AF">UI Components</text>

  <!-- API Routes -->
  <rect x="295" y="230" width="330" height="55" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">⚙️ API Routes</text>
  <text x="460" y="274" text-anchor="middle" font-size="10" fill="#94A3B8">TypeScript</text>

  <!-- Arrow vercel → prisma -->
  <line x1="460" y1="350" x2="460" y2="385" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Prisma -->
  <rect x="365" y="390" width="190" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="417" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400E">🔗 Prisma 7</text>
  <text x="460" y="432" text-anchor="middle" font-size="10" fill="#92400E">ORM</text>

  <!-- Arrow prisma → supabase -->
  <line x1="460" y1="440" x2="460" y2="475" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- === Supabase Container === -->
  <rect x="260" y="480" width="400" height="130" rx="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <rect x="260" y="480" width="400" height="32" rx="12" fill="#DCFCE7"/>
  <rect x="260" y="500" width="400" height="12" fill="#DCFCE7"/>
  <text x="460" y="501" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">🗄️ Supabase</text>

  <!-- PostgreSQL -->
  <ellipse cx="460" cy="556" rx="15" ry="8" fill="#3B82F6"/>
  <rect x="445" y="548" width="30" height="30" fill="#3B82F6"/>
  <ellipse cx="460" cy="578" rx="90" ry="22" fill="#3B82F6" stroke="#2563EB" stroke-width="2"/>
  <text x="460" y="575" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">🐘 PostgreSQL</text>
  <text x="460" y="590" text-anchor="middle" font-size="9" fill="#DBEAFE">マネージド Postgres</text>
</svg>
